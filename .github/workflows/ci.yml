name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn -B -U -DskipTests package

      - name: Run TestNG suite
        env:
          BSB_EMAIL: ${{ secrets.BSB_EMAIL }}
          BSB_PASSWORD: ${{ secrets.BSB_PASSWORD }}
        run: mvn -B -U -Dbrowser=chrome-headless -Dbsb.email=${{ secrets.BSB_EMAIL }} -Dbsb.password=${{ secrets.BSB_PASSWORD }} test
